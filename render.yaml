services:
  - type: web
    name: error-site
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: error-site-db
          property: connectionString

databases:
  - name: error-site-db
    plan: free
