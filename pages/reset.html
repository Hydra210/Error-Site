<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password — Error Dev Group</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding: 80px 20px; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background: rgba(4,8,15,0.95); border:1px solid var(--border); padding:28px; border-radius:18px; width:100%; max-width:520px; }
    label { display:block; margin-top:12px; color:var(--text-1); }
    input.input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background: rgba(4,8,15,0.7); color:var(--text-0); }
    .btn { margin-top:16px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Reset your password</h2>
    <p class="note">Enter a new password for your account.</p>
    <label>New password</label>
    <input id="new-pass" class="input" type="password" />
    <label>Confirm password</label>
    <input id="confirm-pass" class="input" type="password" />
    <div class="row">
      <button class="btn primary" id="reset-btn">Set new password</button>
    </div>
    <div id="result" class="note"></div>
  </div>

  <script>
    function qs(name){
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    document.getElementById('reset-btn').addEventListener('click', async ()=>{
      const np = document.getElementById('new-pass').value;
      const cp = document.getElementById('confirm-pass').value;
      if (!np || np.length < 8) return alert('Password must be at least 8 characters');
      if (np !== cp) return alert('Passwords do not match');
      const token = qs('token');
      const email = qs('email');
      if (!token || !email) return alert('Missing token or email');
      const btn = document.getElementById('reset-btn'); btn.disabled = true; btn.textContent='Resetting...';
      try {
        const resp = await fetch('/api/auth/reset-password', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ token, email, newPassword: np }) });
        const data = await resp.json();
        if (resp.ok) {
          alert('Password reset. You can now log in.');
          window.location.href = '/pages/login.html';
        } else {
          alert(data.error || 'Unable to reset password');
        }
      } catch (e) {
        alert(e.message || 'Network error');
      } finally { btn.disabled=false; btn.textContent='Set new password'; }
    });
  </script>
</body>
</html>
