<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Error Dev Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 11px; border-radius: var(--radius-md);
      background: var(--bg-3); border: 1px solid var(--border);
      font-size: 14px; font-weight: 600; color: var(--text-1); cursor: pointer;
      transition: all var(--duration) var(--spring); font-family: var(--font-body);
    }
    .social-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
    .social-btn:hover { border-color: var(--border-hover); color: var(--text-0); transform: translateY(-2px); background: var(--bg-4); }

    .input-icon-wrap { position: relative; }
    .input-icon-wrap .input { padding-left: 42px; width: 100%; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
    }
    .input-icon svg { width: 15px; height: 15px; display: block; }

    .show-pass {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-3);
      transition: color 0.2s; padding: 0;
    }
    .show-pass svg { width: 15px; height: 15px; display: block; }
    .show-pass:hover { color: var(--text-1); }

    .forgot-link { font-size: 12.5px; color: var(--blue-400); font-weight: 600; float: right; margin-top: -2px; }
    .forgot-link:hover { color: var(--blue-300); }

    .input-error {
      font-size: 12px; color: #f87171; margin-top: 5px; display: none;
    }
    .input-error.show { display: block; }
    .input.invalid { border-color: rgba(248,113,113,0.5); }
    .input.invalid:focus { box-shadow: 0 0 0 3px rgba(248,113,113,0.1); }
  </style>
</head>
<body>

<div class="orb-field">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Log in to your Error account</div>
    </div>

    <button class="social-btn" onclick="showToast('Discord login coming soon', 'info')" style="margin-bottom:6px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="color:#5865f2;">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Continue with Discord
    </button>

    <div class="form-divider"><span>or continue with username</span></div>

    <div class="form-group">
      <label class="form-label" for="login-user">Username</label>
      <div class="input-icon-wrap">
        <span class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input class="input" id="login-user" type="text" placeholder="Your username" autocomplete="username" />
      </div>
      <div class="input-error" id="user-err">Username is required</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="login-pass" style="display:flex; justify-content:space-between; align-items:center;">
        Password
        <a href="#" class="forgot-link" onclick="showToast('Password reset coming soon', 'info'); return false;">Forgot?</a>
      </label>
      <div class="input-icon-wrap">
        <span class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input class="input" id="login-pass" type="password" placeholder="Your password" autocomplete="current-password" style="padding-right: 42px;" />
        <button class="show-pass" id="toggle-pass" onclick="togglePass()" type="button" aria-label="Show password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="input-error" id="pass-err">Password is required</div>
    </div>

    <button class="btn btn-primary" style="width:100%; justify-content:center; padding:13px; margin-top: 8px; margin-bottom: 16px;" onclick="handleLogin()" id="login-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Log in
    </button>

    <div class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></div>
    <div style="text-align:center; margin-top:12px;">
      <a href="../index.html" style="font-size:13px; color:var(--text-3); display:inline-flex; align-items:center; gap:5px; transition: color 0.2s;" onmouseover="this.style.color='var(--text-1)'" onmouseout="this.style.color='var(--text-3)'">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to home
      </a>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script src="../js/main.js"></script>
<script>
  function togglePass() {
    const inp = document.getElementById('login-pass');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      inp.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }

  function handleLogin() {
    const u = document.getElementById('login-user');
    const p = document.getElementById('login-pass');
    const ue = document.getElementById('user-err');
    const pe = document.getElementById('pass-err');
    let valid = true;

    u.classList.remove('invalid'); ue.classList.remove('show');
    p.classList.remove('invalid'); pe.classList.remove('show');

    if (!u.value.trim()) { u.classList.add('invalid'); ue.classList.add('show'); valid = false; }
    if (!p.value.trim()) { p.classList.add('invalid'); pe.classList.add('show'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('login-btn');
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 0.8s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg> Logging in...`;
    btn.disabled = true;

    setTimeout(() => {
      showToast('Logged in — backend auth needed for real sessions', 'success');
      setTimeout(() => { window.location.href = '../index.html'; }, 1200);
    }, 1400);
  }

  // enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>

<style>
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

</body>
</html>
